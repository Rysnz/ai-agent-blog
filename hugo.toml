baseURL = "http://rysn.xyz/"
title = "AI Agent 技术博客"
languageCode = "zh-cn"
enableRobotsTXT = true
enableGitInfo = true
enableShortcodes = true
hasCJKLanguage = true

[params]
  author = "Rysn"
  description = "AI Agent 系统设计、模式与实践"
  copyright = "© 2026 Rysn"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true

[markup.tableOfContents]
  endLevel = 3
  ordered = false
  startLevel = 2

