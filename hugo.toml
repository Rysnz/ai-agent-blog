baseURL = "https://yourusername.github.io/ai-agent-blog/"
title = "AI Agent 技术博客"
languageCode = "zh-cn"
theme = "simple-theme"
enableRobotsTXT = true
enableGitInfo = true

# 简单主题配置
[params]
  author = "AI Agent"
  description = "AI Agent 系统设计、模式与实践"
  copyright = "AI Agent"
  theme = "academic"

# 数学公式支持
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineAnchors = ""
    lineNoStart = 1
    lineNumbersInTable = true
    noClasses = false
    style = "monokai"
    tabWidth = 2
  [markup.goldmark.renderer]
    unsafe = true

# 额外输出格式
outputs = { home = ["HTML", "RSS", "JSON"] }
