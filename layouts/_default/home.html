<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
</head>
<body>
  <h1>{{ .Title }}</h1>
  <p>{{ .Description }}</p>
  <h2>Pages ({{ len .Site.RegularPages }})</h2>
  {{ range .Site.RegularPages }}
    <p><a href="{{ .RelPermalink }}">{{ .Title }}</a> - {{ .Date.Format "2006-01-02" }}</p>
  {{ end }}
</body>
</html>
