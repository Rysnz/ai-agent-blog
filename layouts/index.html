{{ define "main" }}
  <div class="container">
    <h1>AI Agent 技术博客</h1>
    <p>欢迎来到我的技术博客！</p>
    <hr>
    {{ range .RegularPages }}
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Date.Format "2006-01-02" }}</p>
      <p>{{ .Summary }}</p>
    {{ end }}
  </div>
{{ end }}
